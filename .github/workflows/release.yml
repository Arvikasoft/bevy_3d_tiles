# Publishes to crates.io via Trusted Publishing (OIDC — no long-lived token).
# One-time setup on crates.io (crate Settings → Trusted Publishing): authorize
# this repository + the `release` environment for `bevy_3d_tiles`.
# Release flow: bump version in Cargo.toml → tag `vX.Y.Z` → push the tag.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # tags + history: the announce step reads the annotated tag message
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # Announce the release in #bevy-3d-tiles on the public TurboTwin Discord
      # (the channel the crate README points users at). Runs only after a
      # successful publish, and never fails the release if Discord is down —
      # a missed announcement is not a broken release.
      - name: Announce on Discord
        if: success() && env.WEBHOOK != ''
        continue-on-error: true
        env:
          WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          VERSION: ${{ github.ref_name }}
        run: |
          # No GitHub Release object is created for this crate — crates.io is the
          # distribution channel and a library has no binaries to attach. Link
          # there instead. The release note is the ANNOTATED TAG's message, so
          # it lives with the tag and there is no CHANGELOG file to rot; a
          # lightweight tag just falls back to the commit range.
          NOTE=$(git for-each-ref --format='%(contents)' "refs/tags/$VERSION" | head -c 1500)
          PREV=$(git describe --tags --abbrev=0 "$VERSION^" 2>/dev/null || true)
          if [ -n "$PREV" ]; then
            RANGE="https://github.com/Arvikasoft/bevy_3d_tiles/compare/$PREV...$VERSION"
          else
            RANGE="https://github.com/Arvikasoft/bevy_3d_tiles/commits/$VERSION"
          fi
          jq -n --arg v "$VERSION" --arg note "$NOTE" --arg range "$RANGE" '{
            embeds: [{
              title: "bevy_3d_tiles \($v)",
              url: "https://crates.io/crates/bevy_3d_tiles",
              description: (
                (if $note == "" then "" else $note + "\n\n" end)
                + "`cargo add bevy_3d_tiles` · [changes](\($range)) · [docs.rs](https://docs.rs/bevy_3d_tiles)"
              ),
              color: 5814783
            }]
          }' | curl -sS -X POST -H 'Content-Type: application/json' -d @- "$WEBHOOK"
